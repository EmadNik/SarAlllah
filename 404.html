<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>صفحه یافت نشد — هیئت ثارالله</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500;600;700;800&family=Gulzar&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Vazirmatn', 'Tahoma', sans-serif;
      background: #0A0A0A;
      color: #F5ECD9;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
      line-height: 1.85;
    }
    .container { max-width: 600px; }
    .ornament {
      font-family: 'Gulzar', serif;
      font-size: 4rem;
      color: #D4AF37;
      margin-bottom: 1rem;
      text-shadow: 0 0 30px rgba(212, 175, 55, 0.4);
    }
    h1 {
      font-family: 'Gulzar', serif;
      font-size: 2.5rem;
      color: #F7E8A8;
      margin-bottom: 1rem;
    }
    p {
      color: rgba(245, 236, 217, 0.8);
      margin-bottom: 1.5rem;
    }
    a {
      display: inline-block;
      padding: 0.85rem 2rem;
      background: linear-gradient(135deg, #9F1239 0%, #8B0000 100%);
      color: #F7E8A8;
      text-decoration: none;
      border: 1px solid #D4AF37;
      border-radius: 4px;
      font-weight: 600;
      transition: all 0.3s;
    }
    a:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 28px -8px rgba(139, 0, 0, 0.8);
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="ornament">۞</div>
    <h1>صفحه یافت نشد</h1>
    <p>صفحه‌ای که به دنبال آن هستید وجود ندارد یا منتقل شده است.</p>
    <a href="/">بازگشت به صفحه اصلی</a>
  </div>
</body>
</html>
